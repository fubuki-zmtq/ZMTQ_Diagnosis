<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ZMTQ属性・能力診断</title>
<link href="https://fonts.googleapis.com/css2?family=DotGothic16&display=swap" rel="stylesheet">
<style>
  :root {
    --bg-color: #0b1319;
    --card-bg: rgba(20, 34, 43, 0.85);
    --text-main: #e2e8f0;
    --accent-cyan: #00e5ff;
    --accent-dim: #005f73;
  }

  body {
    margin: 0; padding: 0; min-height: 100dvh; 
    display: flex; justify-content: center; align-items: center;
    font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', 'Hiragino Sans', Meiryo, sans-serif;
    color: var(--text-main);
    background: linear-gradient(-45deg, #0b1319, #1a2a3a, #005f73, #0b1319);
    background-size: 400% 400%;
    animation: gradientBG 15s ease infinite;
    overflow: hidden;
  }

  @keyframes gradientBG {
    0% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
    100% { background-position: 0% 50%; }
  }

  .dot-font { font-family: 'DotGothic16', sans-serif; letter-spacing: 2px; }

  .no-select {
    -webkit-touch-callout: none; -webkit-user-select: none; user-select: none;
  }

  #app {
    width: 100%; max-width: 600px; padding: 20px;
    box-sizing: border-box; position: relative; z-index: 10;
  }

  .card {
    background-color: var(--card-bg); border: 1px solid var(--accent-dim);
    border-radius: 8px; padding: 30px; box-shadow: 0 4px 20px rgba(0, 229, 255, 0.1);
    backdrop-filter: blur(5px);
  }

  #progress-container { margin-bottom: 30px; text-align: right; }
  #step-counter { font-family: 'Courier New', Courier, monospace; font-size: 0.9em; color: var(--accent-cyan); margin-bottom: 8px; letter-spacing: 2px; }
  #progress-bar-bg { width: 100%; height: 4px; background-color: var(--accent-dim); border-radius: 2px; overflow: hidden; }
  #progress-bar-fill { width: 0%; height: 100%; background-color: var(--accent-cyan); transition: width 0.4s ease; box-shadow: 0 0 10px var(--accent-cyan); }
  .question-text { font-size: 1.2em; line-height: 1.6; margin-bottom: 30px; text-align: center; }
  .option-btn { display: block; width: 100%; background: transparent; color: var(--text-main); border: 1px solid var(--accent-dim); padding: 15px; margin-bottom: 12px; border-radius: 4px; font-size: 1em; cursor: pointer; transition: all 0.3s ease; text-align: left; }
  .option-btn:hover { background-color: rgba(0, 229, 255, 0.15); border-color: var(--accent-cyan); box-shadow: 0 0 15px rgba(0, 229, 255, 0.3); transform: translateX(5px); }
  .fade-out { opacity: 0; transition: opacity 0.3s ease; }
  .fade-in { opacity: 1; transition: opacity 0.3s ease; }

  .crystal-container { padding: 20px 0; }
  .crystal-loader { width: 40px; height: 40px; background: transparent; border: 2px solid var(--accent-cyan); margin: 0 auto; position: relative; transform: rotate(45deg); animation: crystalPulse 2s infinite ease-in-out, crystalRotate 5s infinite linear; box-shadow: 0 0 15px rgba(0, 229, 255, 0.5); }
  .crystal-loader::after { content: ''; position: absolute; top: 4px; left: 4px; right: 4px; bottom: 4px; border: 1px solid var(--accent-cyan); opacity: 0.6; }
  @keyframes crystalPulse { 0%, 100% { box-shadow: 0 0 10px rgba(0, 229, 255, 0.3); opacity: 0.6; } 50% { box-shadow: 0 0 25px rgba(0, 229, 255, 0.8); opacity: 1; } }
  @keyframes crystalRotate { 0% { transform: rotate(45deg); } 100% { transform: rotate(405deg); } }

  .result-title { font-size: 1em; color: var(--accent-cyan); margin-bottom: 5px; }
  .result-value { font-size: 2.2em; margin-bottom: 20px; text-shadow: 0 0 10px rgba(0, 229, 255, 0.5); }
  .result-desc { font-size: 1em; line-height: 1.8; margin-top: 20px; padding-top: 20px; border-top: 1px dashed var(--accent-dim); }
  .action-btn { display: inline-block; background-color: var(--accent-cyan); color: var(--bg-color); border: none; padding: 12px 24px; border-radius: 4px; font-size: 1em; font-weight: bold; cursor: pointer; margin-top: 30px; transition: opacity 0.2s, box-shadow 0.2s; }
  .action-btn:hover { opacity: 0.9; box-shadow: 0 0 15px var(--accent-cyan); }
  .nav-btn { position: fixed; z-index: 100; background: rgba(0, 0, 0, 0.5); border: 1px solid var(--accent-dim); color: var(--accent-cyan); padding: 8px 16px; border-radius: 4px; cursor: pointer; font-size: 0.9em; transition: all 0.2s; }
  .nav-btn:hover { background: rgba(0, 229, 255, 0.2); border-color: var(--accent-cyan); }
  #home-btn { top: 20px; right: 20px; display: block; }
  #back-btn { bottom: 20px; left: 20px; display: none; }

  /* 変更点：ふわっとした柔らかな発光エフェクト */
  .flash-overlay {
    position: fixed; top: 50%; left: 50%; width: 150vw; height: 150vw;
    background: radial-gradient(circle, rgba(255,255,255,0.9) 0%, rgba(255,255,255,0) 60%);
    transform: translate(-50%, -50%) scale(0);
    z-index: 9999; pointer-events: none; opacity: 0; border-radius: 50%;
  }
  .flash-active { animation: flashSoft 1.5s ease-out forwards; }
  @keyframes flashSoft {
    0% { transform: translate(-50%, -50%) scale(0); opacity: 0; }
    20% { transform: translate(-50%, -50%) scale(2); opacity: 1; }
    60% { transform: translate(-50%, -50%) scale(2); opacity: 1; }
    100% { transform: translate(-50%, -50%) scale(2); opacity: 0; }
  }

  #console-screen {
    background-color: #000; color: #fff;
    font-family: 'Courier New', Courier, monospace; font-size: 1.1rem; line-height: 2.5;
    padding: 30px; box-sizing: border-box;
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    z-index: 5000; overflow-y: auto; display: none;
  }
  .console-input {
    background: transparent; border: none; color: #fff;
    font-family: inherit; font-size: inherit; outline: none; width: 85%;
  }
  #console-hint {
    position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
    color: #888; font-size: 0.9rem; opacity: 0; transition: opacity 1s; pointer-events: none;
  }

  /* 変更点：途中で消えないように距離と時間を延長 */
  .hex-float {
    position: fixed; bottom: -100px;
    color: rgba(0, 229, 255, 0.2); font-family: 'Courier New', Courier, monospace;
    font-size: 1.5rem; letter-spacing: 4px;
    transform: rotate(90deg); transform-origin: left bottom;
    z-index: 1; pointer-events: none;
  }
  @keyframes floatUpHex { 
    0% { bottom: -100px; }
    100% { bottom: 150vh; } 
  }
</style>
</head>
<body>

<script src="questions.js"></script>
<div id="flash-overlay" class="flash-overlay"></div>
<button id="home-btn" class="nav-btn dot-font" onclick="location.reload()">HOME</button>
<button id="back-btn" class="nav-btn dot-font" onclick="goBack()">◀ 戻る</button>

<div id="console-screen">
  <div id="console-content"></div>
</div>
<div id="console-hint">Enterで送信</div>

<div id="app">
  <div id="start-screen" class="card fade-in">
    <div style="text-align: center;">
      <h1 class="dot-font" style="color: var(--accent-cyan); font-size: 2em; margin-bottom: 10px;">ZMTQ<br>属性・能力診断</h1>
      <p style="margin-bottom: 30px; font-size: 0.9em; color: #a0aec0;">あなたの立ち回りや傾向を解析し、<br>最適な属性とステータスを算出します。</p>
      <button class="action-btn dot-font no-select" 
              onmousedown="handleTouchStart(event)" 
              onmouseup="handleTouchEnd(event)" 
              onmouseleave="handleTouchEnd(event)" 
              ontouchstart="handleTouchStart(event)" 
              ontouchend="handleTouchEnd(event)" 
              onclick="handleStartClick(event)">鑑定を開始する</button>
    </div>
  </div>

  <div id="quiz-screen" style="display: none;">
    <div id="progress-container">
      <div id="step-counter">01 / 20</div>
      <div id="progress-bar-bg"><div id="progress-bar-fill"></div></div>
    </div>
    <div id="question-card" class="card">
      <div id="question-text" class="question-text"></div>
      <div id="options-container"></div>
    </div>
  </div>

  <div id="loading-screen" class="card" style="display: none; text-align: center;">
    <div class="crystal-container">
      <div class="crystal-loader"></div>
    </div>
    <p id="loading-msg" class="dot-font" style="color: var(--accent-cyan); margin-top: 25px; font-size: 1.1em;"></p>
  </div>

  <div id="result-screen" class="card" style="display: none;">
    <div id="result-content"></div>
    <div style="text-align: center;">
      <button class="action-btn dot-font" onclick="copyResult()">結果をコピー</button>
    </div>
  </div>
</div>

<script>
let currentQuestionIndex = 0;
let answerHistory = []; 
let finalResultData = {}; 

function showLoadingScreen(msg, callback) {
  const lScreen = document.getElementById('loading-screen');
  document.getElementById('loading-msg').innerText = msg;
  lScreen.style.display = 'block';
  lScreen.classList.add('fade-in');
  
  setTimeout(() => {
    lScreen.classList.remove('fade-in');
    lScreen.classList.add('fade-out');
    setTimeout(() => {
      lScreen.style.display = 'none';
      lScreen.classList.remove('fade-out');
      callback();
    }, 300);
  }, 2500);
}

function showQuestion() {
  const qCard = document.getElementById('question-card');
  qCard.classList.remove('fade-out');
  qCard.classList.add('fade-in');
  document.getElementById('back-btn').style.display = currentQuestionIndex > 0 ? 'block' : 'none';

  const q = questions[currentQuestionIndex];
  document.getElementById('question-text').innerText = q.text;
  
  const stepText = String(currentQuestionIndex + 1).padStart(2, '0') + " / " + questions.length;
  document.getElementById('step-counter').innerText = stepText;
  const progressPercent = (currentQuestionIndex / questions.length) * 100;
  document.getElementById('progress-bar-fill').style.width = progressPercent + '%';

  const optionsContainer = document.getElementById('options-container');
  optionsContainer.innerHTML = '';
  q.options.forEach(opt => {
    const btn = document.createElement('button');
    btn.className = 'option-btn';
    btn.innerText = opt.text;
    btn.onclick = () => handleAnswer(opt.effects);
    optionsContainer.appendChild(btn);
  });
}

function handleAnswer(effects) {
  answerHistory[currentQuestionIndex] = effects;
  const qCard = document.getElementById('question-card');
  qCard.classList.remove('fade-in');
  qCard.classList.add('fade-out');

  setTimeout(() => {
    currentQuestionIndex++;
    if (currentQuestionIndex < questions.length) {
      showQuestion();
    } else {
      document.getElementById('quiz-screen').style.display = 'none';
      showLoadingScreen("魂を鑑定しています…", calculateResult);
    }
  }, 300);
}

function goBack() {
  if (currentQuestionIndex > 0) {
    const qCard = document.getElementById('question-card');
    qCard.classList.remove('fade-in');
    qCard.classList.add('fade-out');
    setTimeout(() => {
      currentQuestionIndex--;
      showQuestion();
    }, 200);
  }
}

function calculateResult() {
  document.getElementById('progress-bar-fill').style.width = '100%';
  document.getElementById('back-btn').style.display = 'none';
  
  let points = { "光":0, "水":0, "木":0, "氷":0, "毒":0, "地":0, "風":0, "火":0, "雷":0, "闇":0, "HP":0, "力":0, "魔力":0, "防御":0, "魔防":0, "速さ":0 };
  let allAttrBonus = 0; let allStatBonus = 0;

  answerHistory.forEach(effects => {
    for (const [key, val] of Object.entries(effects)) {
      if (key === "全属性") { allAttrBonus += val; }
      else if (key === "全能力") { allStatBonus += val; }
      else { points[key] += val; }
    }
  });

  const attrKeys = ["光", "水", "木", "氷", "毒", "地", "風", "火", "雷", "闇"];
  const statKeys = ["HP", "力", "魔力", "防御", "魔防", "速さ"];
  statKeys.forEach(k => points[k] += allStatBonus);

  // 変更点：優先順位リストを定義し、同点時の並び替えルールに適用
  const attrPriority = ["光", "水", "木", "闇", "火", "風", "雷", "地", "氷", "毒"];
  
  let attrs = attrKeys.map(k => ({name: k, val: points[k]})).sort((a, b) => {
    if (b.val !== a.val) return b.val - a.val;
    return attrPriority.indexOf(a.name) - attrPriority.indexOf(b.name);
  });
  
  let stats = statKeys.map(k => ({name: k, val: points[k]})).sort((a, b) => b.val - a.val);

  let isAllAttr = (attrs[0].val - attrs[attrs.length-1].val) <= (4 + allAttrBonus * 2);
  let isAllStats = (stats[stats.length-1].val >= 1) && ((stats[0].val - stats[stats.length-1].val) <= (4 + allStatBonus));

  // 変更点：デュアル属性の判定
  let isDualAttr = false;
  if (!isAllAttr && attrs[0].val === attrs[1].val) {
    isDualAttr = true;
  }

  let topStatsArray = [];
  for (let i = 0; i < stats.length; i++) {
    if (stats[0].val - stats[i].val <= 1) topStatsArray.push(stats[i].name);
    else break;
  }

  finalResultData = {
    isAllAttr: isAllAttr,
    isDualAttr: isDualAttr,
    isAllStats: isAllStats,
    topAttr: attrs[0].name,
    topAttr2: attrs[1].name,
    secondAttr: isDualAttr ? attrs[2].name : attrs[1].name,
    topStatsStr: topStatsArray.join("、"),
    topStatForDesc: stats[0].name 
  };
  renderResult();
}

function renderResult() {
  const rScreen = document.getElementById('result-screen');
  rScreen.style.display = 'block'; rScreen.classList.add('fade-in');
  const content = document.getElementById('result-content');
  let html = "";

  if (finalResultData.isAllAttr) {
    html += `<div class="result-title">あなたにぴったりの属性は…</div><div class="result-value dot-font">【全属性】</div><div class="result-title">その中で一番適性がある属性：${finalResultData.topAttr}</div>`;
  } else if (finalResultData.isDualAttr) {
    html += `<div class="result-title">あなたにぴったりの属性は…</div><div class="result-value dot-font">【${finalResultData.topAttr}】＆【${finalResultData.topAttr2}】</div><div class="result-title">次に適性のある属性：${finalResultData.secondAttr}</div>`;
  } else {
    html += `<div class="result-title">あなたにぴったりの属性は…</div><div class="result-value dot-font">【${finalResultData.topAttr}】</div><div class="result-title">次に適性のある属性：${finalResultData.secondAttr}</div>`;
  }
  
  if (finalResultData.isAllStats) {
    html += `<div class="result-title" style="margin-top:15px;">高い能力：全て</div>`;
  } else {
    html += `<div class="result-title" style="margin-top:15px;">高い能力：${finalResultData.topStatsStr}</div>`;
  }

  const allAttrDesc = "あなたは特定の枠に収まらない、多面的で柔軟な性質の持ち主です。状況や相手に合わせて様々な顔を持ち、どのような環境でも自分なりの適応を見せる万能さがあります。";
  const allStatDesc = "心身のバランスが非常に高く、あらゆる場面で平均以上の力を発揮できるタイプです。極端な弱点が少なく、何事もそつなくこなす総合力を持っています。";
  
  // 変更点：デュアル属性時の文章合成
  let attrText = "";
  if (finalResultData.isAllAttr) {
    attrText = allAttrDesc;
  } else if (finalResultData.isDualAttr) {
    const text1 = attributesDesc[finalResultData.topAttr];
    const text2 = attributesDesc[finalResultData.topAttr2].replace("あなたは", "");
    attrText = text1 + "<br><br>また、" + text2;
  } else {
    attrText = attributesDesc[finalResultData.topAttr];
  }

  const statText = finalResultData.isAllStats ? allStatDesc : abilitiesDesc[finalResultData.topStatForDesc];
  
  html += `<div class="result-desc">${attrText}<br><br>さらに、あなたは${statText}</div>`;
  content.innerHTML = html;
}

function copyResult() {
  let copyText = "";
  if (finalResultData.isAllAttr) { 
    copyText += `あなたにぴったりの属性は…【全属性】\nその中で一番適性がある属性：${finalResultData.topAttr}\n`; 
  } else if (finalResultData.isDualAttr) {
    copyText += `あなたにぴったりの属性は…【${finalResultData.topAttr}】＆【${finalResultData.topAttr2}】\n次に適性のある属性：${finalResultData.secondAttr}\n`;
  } else { 
    copyText += `あなたにぴったりの属性は…【${finalResultData.topAttr}】\n次に適性のある属性：${finalResultData.secondAttr}\n`; 
  }
  
  if (finalResultData.isAllStats) { copyText += `高い能力：全て\n\n`; } 
  else { copyText += `高い能力：${finalResultData.topStatsStr}\n\n`; }
  copyText += `ZMTQ属性・能力診断\n${window.location.href}`;

  navigator.clipboard.writeText(copyText).then(() => { alert("診断結果をコピーしました！"); }).catch(err => { alert("コピーに失敗しました。"); });
}

let pressTimer;
let isLongPress = false;

function handleTouchStart(e) {
  isLongPress = false;
  pressTimer = setTimeout(() => {
    isLongPress = true;
    startSecretSequence();
  }, 5000);
}
function handleTouchEnd(e) { clearTimeout(pressTimer); }

function handleStartClick(e) {
  if (isLongPress) return; 
  
  const flash = document.getElementById('flash-overlay');
  flash.classList.add('flash-active');
  
  setTimeout(() => {
    document.getElementById('start-screen').style.display = 'none';
    document.getElementById('quiz-screen').style.display = 'block';
    document.getElementById('quiz-screen').classList.add('fade-in');
    showQuestion();
  }, 400); 
  
  setTimeout(() => { flash.classList.remove('flash-active'); }, 1500);
}

function startSecretSequence() {
  document.getElementById('start-screen').style.display = 'none';
  document.getElementById('home-btn').style.display = 'block';
  showLoadingScreen("記憶を呼び覚ましています…", initConsole);
}

let consoleTimeout;
let consoleStep = 0;

function resetConsoleTimeout() {
  clearTimeout(consoleTimeout);
  consoleTimeout = setTimeout(flashAndHome, 60000); 
}

function flashAndHome() {
  clearTimeout(consoleTimeout);
  const flash = document.getElementById('flash-overlay');
  flash.classList.add('flash-active');
  
  setTimeout(() => {
    document.getElementById('console-screen').style.display = 'none';
    document.getElementById('start-screen').style.display = 'block';
    document.getElementById('loading-screen').style.display = 'none';
    document.getElementById('console-content').innerHTML = ''; 
    document.getElementById('console-hint').style.opacity = 0;
  }, 400);
  
  setTimeout(() => { flash.classList.remove('flash-active'); }, 1500);
}

async function initConsole() {
  const cScreen = document.getElementById('console-screen');
  cScreen.style.display = 'block';
  consoleStep = 0;
  resetConsoleTimeout();
  await typeText("なかなかおわらないこのくらやみ");
  createInputLine();
}

async function typeText(text) {
  const cContent = document.getElementById('console-content');
  const line = document.createElement('div');
  cContent.appendChild(line);
  for(let i=0; i<text.length; i++){
    line.innerHTML += text.charAt(i);
    document.getElementById('console-screen').scrollTop = document.getElementById('console-screen').scrollHeight;
    await new Promise(r => setTimeout(r, 120)); 
  }
}

function createInputLine() {
  const cContent = document.getElementById('console-content');
  const line = document.createElement('div');
  line.innerHTML = `<span style="margin-right:8px;">></span><input type="text" class="console-input" autofocus autocomplete="off">`;
  cContent.appendChild(line);
  
  const cScreen = document.getElementById('console-screen');
  cScreen.scrollTop = cScreen.scrollHeight; 
  
  const input = line.querySelector('input');
  input.focus();
  document.getElementById('console-hint').style.opacity = 1;
  input.addEventListener('input', resetConsoleTimeout);
  
  input.addEventListener('keydown', async (e) => {
    if(e.key === 'Enter') {
      const val = input.value;
      input.disabled = true; 
      document.getElementById('console-hint').style.opacity = 0;
      
      if (consoleStep === 0) {
        if (val === "ぼくのこえがきみにきこえますか？") {
          consoleStep = 1;
          resetConsoleTimeout();
          await typeText("どんなにこわくたってなかまをしんじて！");
          createInputLine();
        } else { flashAndHome(); }
      } else if (consoleStep === 1) {
        if (val === "ぼくもきみをしんじるから") {
          clearTimeout(consoleTimeout);
          document.getElementById('console-screen').style.display = 'none';
          document.getElementById('console-content').innerHTML = '';
          showLoadingScreen("Memory fragments restored...", completeSecret);
        } else { flashAndHome(); }
      }
    }
  });
}

function completeSecret() {
  document.getElementById('start-screen').style.display = 'block';
  setInterval(spawnHex, 5000);
  spawnHex();
}

const hexCodes = ["e4b896e7958c", "e5a48f", "e3839fe383a9e382a4", "e6a084e58589", "e9bc93e58b95", "e58f8be68385", "e38288e3819ee38289", "e9bb8ee6988e", "e382ade382bbe382ad"];
function spawnHex() {
  if (document.getElementById('start-screen').style.display === 'none') return;
  const hex = hexCodes[Math.floor(Math.random() * hexCodes.length)];
  const el = document.createElement('div');
  el.className = 'hex-float';
  el.innerText = hex;
  el.style.left = Math.floor(Math.random() * 80 + 10) + '%';
  el.style.animation = `floatUpHex ${10 + Math.random() * 5}s linear forwards`;
  document.body.appendChild(el);
  setTimeout(() => el.remove(), 16000);
}
</script>
</body>
</html>
