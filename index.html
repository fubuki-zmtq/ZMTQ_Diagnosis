<link href="https://fonts.googleapis.com/css2?family=DotGothic16&display=swap" rel="stylesheet">
<style>

    animation: gradientBG 15s ease infinite;
  }

  @keyframes gradientBG {
    0% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
    100% { background-position: 0% 50%; }
  }

  .dot-font {
    font-family: 'DotGothic16', sans-serif;
    letter-spacing: 2px;
  }

    padding: 20px;

    position: relative;
    z-index: 10;
  }

    background-color: var(--card-bg);
    border: 1px solid var(--accent-dim);
    border-radius: 8px;
    padding: 30px;
    box-shadow: 0 4px 20px rgba(0, 229, 255, 0.1);
    backdrop-filter: blur(5px);
  }

  #progress-container {
    margin-bottom: 30px;
    text-align: right;
  }
  #step-counter {
    font-family: 'Courier New', Courier, monospace;
    font-size: 0.9em;
    color: var(--accent-cyan);
    margin-bottom: 8px;
    letter-spacing: 2px;
  }
  #progress-bar-bg {
    width: 100%;
    height: 4px;
    background-color: var(--accent-dim);
    border-radius: 2px;
    overflow: hidden;
  }
  #progress-bar-fill {
    width: 0%;
    height: 100%;
    background-color: var(--accent-cyan);
    transition: width 0.4s ease;
    box-shadow: 0 0 10px var(--accent-cyan);
  }

    font-size: 1.2em;
    line-height: 1.6;
    margin-bottom: 30px;
    text-align: center;
  }

    border-color: var(--accent-cyan);
    box-shadow: 0 0 15px rgba(0, 229, 255, 0.3);
    transform: translateX(5px);
  }

  .fade-in { opacity: 1; transition: opacity 0.3s ease; }

    padding: 20px 0;
  }

    width: 40px;
    height: 40px;
    background: transparent;
    border: 2px solid var(--accent-cyan);
    margin: 0 auto;

  }

    content: '';
    position: absolute;
    top: 4px; left: 4px; right: 4px; bottom: 4px;
    border: 1px solid var(--accent-cyan);
    opacity: 0.6;
  }
  @keyframes crystalPulse {
    0%, 100% {

    }

// --- 状態管理 ---
let currentQuestionIndex = 0;
let answerHistory = []; 
let finalResultData = {}; 

function startQuiz() {
  document.getElementById('start-screen').style.display = 'none';
  document.getElementById('quiz-screen').style.display = 'block';
  document.getElementById('quiz-screen').classList.add('fade-in');
  document.getElementById('home-btn').style.display = 'block';
  showQuestion();
}

function showQuestion() {
  const qCard = document.getElementById('question-card');
  qCard.classList.remove('fade-out');
  qCard.classList.add('fade-in');

  document.getElementById('back-btn').style.display = currentQuestionIndex > 0 ? 'block' : 'none';

  const q = questions[currentQuestionIndex];
  document.getElementById('question-text').innerText = q.text;
  
  const stepText = String(currentQuestionIndex + 1).padStart(2, '0') + " / " + questions.length;
  document.getElementById('step-counter').innerText = stepText;
  const progressPercent = (currentQuestionIndex / questions.length) * 100;
  document.getElementById('progress-bar-fill').style.width = progressPercent + '%';

  const optionsContainer = document.getElementById('options-container');
  optionsContainer.innerHTML = '';

  q.options.forEach(opt => {
    const btn = document.createElement('button');
    btn.className = 'option-btn';
    btn.innerText = opt.text;
    btn.onclick = () => handleAnswer(opt.effects);
    optionsContainer.appendChild(btn);
  });
}

function handleAnswer(effects) {
  answerHistory[currentQuestionIndex] = effects;

  const qCard = document.getElementById('question-card');
  qCard.classList.remove('fade-in');
  qCard.classList.add('fade-out');

  setTimeout(() => {
    currentQuestionIndex++;
    if (currentQuestionIndex < questions.length) {
      showQuestion();
    } else {
      startLoadingScreen();
    }
  }, 300);
}

function goBack() {
  if (currentQuestionIndex > 0) {
    const qCard = document.getElementById('question-card');
    qCard.classList.remove('fade-in');
    qCard.classList.add('fade-out');
    
    setTimeout(() => {
      currentQuestionIndex--;
      showQuestion();
    }, 200);
  }
}

// ローディング表示のコントロール
function startLoadingScreen() {
  document.getElementById('quiz-screen').style.display = 'none';
  const lScreen = document.getElementById('loading-screen');
  lScreen.style.display = 'block';
  lScreen.classList.add('fade-in');

  // 神秘的な余韻をもたせるため、2.5秒間ローディングアニメーションを見せる
  setTimeout(() => {
    lScreen.classList.remove('fade-in');
    lScreen.classList.add('fade-out');
    
    setTimeout(() => {
      lScreen.style.display = 'none';
      calculateResult();
    }, 300);
  }, 2500);
}

function calculateResult() {
  document.getElementById('progress-bar-fill').style.width = '100%';
  document.getElementById('back-btn').style.display = 'none';
  
  let points = { "光":0, "水":0, "木":0, "氷":0, "毒":0, "地":0, "風":0, "火":0, "雷":0, "闇":0, "HP":0, "力":0, "魔力":0, "防御":0, "魔防":0, "速さ":0 };
  let allAttrBonus = 0;
  let allStatBonus = 0;

  answerHistory.forEach(effects => {
    for (const [key, val] of Object.entries(effects)) {
      if (key === "全属性") { allAttrBonus += val; }
      else if (key === "全能力") { allStatBonus += val; }
      else { points[key] += val; }
    }
  });

  const attrKeys = ["光", "水", "木", "氷", "毒", "地", "風", "火", "雷", "闇"];
  const statKeys = ["HP", "力", "魔力", "防御", "魔防", "速さ"];

  statKeys.forEach(k => points[k] += allStatBonus);

  let attrs = attrKeys.map(k => ({name: k, val: points[k]})).sort((a, b) => b.val - a.val);
  let stats = statKeys.map(k => ({name: k, val: points[k]})).sort((a, b) => b.val - a.val);

  let isAllAttr = (attrs[0].val - attrs[attrs.length-1].val) <= (4 + allAttrBonus * 2);
  let isAllStats = (stats[stats.length-1].val >= 1) && ((stats[0].val - stats[stats.length-1].val) <= (4 + allStatBonus));

  let topStatsArray = [];
  for (let i = 0; i < stats.length; i++) {
    if (stats[0].val - stats[i].val <= 1) {
      topStatsArray.push(stats[i].name);
    } else {
      break;
    }
  }

  finalResultData = {
    isAllAttr: isAllAttr,
    isAllStats: isAllStats,
    topAttr: attrs[0].name,
    secondAttr: attrs[1].name,
    topStatsStr: topStatsArray.join("、"),
    topStatForDesc: stats[0].name // 不具合修正箇所：statsを参照するように変更
  };

  renderResult();
}

function renderResult() {
  const rScreen = document.getElementById('result-screen');
  rScreen.style.display = 'block';
  rScreen.classList.add('fade-in');

  const content = document.getElementById('result-content');
  let html = "";

  if (finalResultData.isAllAttr) {
    html += `<div class="result-title">あなたにぴったりの属性は…</div>
             <div class="result-value dot-font">【全属性】</div>
             <div class="result-title">その中で一番適性がある属性：${finalResultData.topAttr}</div>`;
  } else {
    html += `<div class="result-title">あなたにぴったりの属性は…</div>
             <div class="result-value dot-font">【${finalResultData.topAttr}】</div>
             <div class="result-title">次に適性のある属性：${finalResultData.secondAttr}</div>`;
  }

  if (finalResultData.isAllStats) {
    html += `<div class="result-title" style="margin-top:15px;">高い能力：全て</div>`;
  } else {
    html += `<div class="result-title" style="margin-top:15px;">高い能力：${finalResultData.topStatsStr}</div>`;
  }

  const attrText = attributesDesc[finalResultData.topAttr];
  const statText = abilitiesDesc[finalResultData.topStatForDesc];
  html += `<div class="result-desc">${attrText}また、あなたは${statText}</div>`;

  content.innerHTML = html;
}

function copyResult() {
  let copyText = "";
  
  if (finalResultData.isAllAttr) {
    copyText += `あなたにぴったりの属性は…【全属性】\nその中で一番適性がある属性：${finalResultData.topAttr}\n`;
  } else {
    copyText += `あなたにぴったりの属性は…【${finalResultData.topAttr}】\n次に適性のある属性：${finalResultData.secondAttr}\n`;
  }

  if (finalResultData.isAllStats) {
    copyText += `高い能力：全て\n\n`;
  } else {
    copyText += `高い能力：${finalResultData.topStatsStr}\n\n`;
  }

  copyText += `ZMTQ属性・能力診断\n${window.location.href}`;

  navigator.clipboard.writeText(copyText).then(() => {
    alert("診断結果をコピーしました！");
  }).catch(err => {
    alert("コピーに失敗しました。");
  });
}
