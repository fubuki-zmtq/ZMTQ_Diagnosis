<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ZMTQ属性・能力診断</title>
<style>
  /* 色彩設定：魔力分析・クリスタルテーマ */
  :root {
    --bg-color: #0b1319; /* 深い青緑系の黒 */
    --card-bg: #14222b;
    --text-main: #e2e8f0; /* プラチナホワイト */
    --accent-cyan: #00e5ff; /* 発光するシアン */
    --accent-dim: #005f73;
  }

  body {
    background-color: var(--bg-color);
    color: var(--text-main);
    font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', 'Hiragino Sans', Meiryo, sans-serif;
    margin: 0;
    padding: 0;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
  }

  #app {
    width: 100%;
    max-width: 600px;
    padding: 20px;
    box-sizing: border-box;
  }

  /* シークバーと進捗 */
  #progress-container {
    margin-bottom: 30px;
    text-align: right;
  }
  #step-counter {
    font-family: 'Courier New', Courier, monospace;
    font-size: 0.9em;
    color: var(--accent-cyan);
    margin-bottom: 8px;
    letter-spacing: 2px;
  }
  #progress-bar-bg {
    width: 100%;
    height: 4px;
    background-color: var(--accent-dim);
    border-radius: 2px;
    overflow: hidden;
  }
  #progress-bar-fill {
    width: 0%;
    height: 100%;
    background-color: var(--accent-cyan);
    transition: width 0.4s ease;
    box-shadow: 0 0 8px var(--accent-cyan);
  }

  /* カードデザイン */
  .card {
    background-color: var(--card-bg);
    border: 1px solid var(--accent-dim);
    border-radius: 8px;
    padding: 30px;
    box-shadow: 0 4px 15px rgba(0, 0, 0, 0.5);
  }

  /* 質問テキスト */
  .question-text {
    font-size: 1.2em;
    line-height: 1.6;
    margin-bottom: 30px;
    text-align: center;
  }

  /* 選択肢ボタン */
  .option-btn {
    display: block;
    width: 100%;
    background: transparent;
    color: var(--text-main);
    border: 1px solid var(--accent-dim);
    padding: 15px;
    margin-bottom: 12px;
    border-radius: 4px;
    font-size: 1em;
    cursor: pointer;
    transition: all 0.2s ease;
    text-align: left;
  }
  .option-btn:hover {
    background-color: rgba(0, 229, 255, 0.1);
    border-color: var(--accent-cyan);
    box-shadow: 0 0 10px rgba(0, 229, 255, 0.2);
  }

  /* アニメーション用クラス */
  .fade-out {
    opacity: 0;
    transition: opacity 0.3s ease;
  }
  .fade-in {
    opacity: 1;
    transition: opacity 0.3s ease;
  }

  /* 結果表示画面 */
  .result-title {
    font-size: 1em;
    color: var(--accent-cyan);
    margin-bottom: 5px;
  }
  .result-value {
    font-size: 1.8em;
    margin-bottom: 20px;
    letter-spacing: 2px;
  }
  .result-desc {
    font-size: 1em;
    line-height: 1.8;
    margin-top: 20px;
    padding-top: 20px;
    border-top: 1px dashed var(--accent-dim);
  }

  .action-btn {
    display: inline-block;
    background-color: var(--accent-cyan);
    color: var(--bg-color);
    border: none;
    padding: 12px 24px;
    border-radius: 4px;
    font-size: 1em;
    font-weight: bold;
    cursor: pointer;
    margin-top: 30px;
    margin-right: 10px;
    transition: opacity 0.2s;
  }
  .action-btn:hover {
    opacity: 0.8;
  }
  .secondary-btn {
    background-color: transparent;
    color: var(--accent-cyan);
    border: 1px solid var(--accent-cyan);
  }
</style>
</head>
<body>

<div id="app">
  <div id="start-screen" class="card fade-in">

      <h1 style="color: var(--accent-cyan); font-weight: normal; letter-spacing: 2px;">ZMTQ属性・能力診断</h1>

      <button class="action-btn" onclick="startQuiz()">診断を開始する</button>
    </div>
  </div>

  <div id="quiz-screen" style="display: none;">
    <div id="progress-container">

      <div id="progress-bar-bg"><div id="progress-bar-fill"></div></div>
    </div>
    <div id="question-card" class="card">
      <div id="question-text" class="question-text"></div>
      <div id="options-container"></div>
    </div>
  </div>

  <div id="result-screen" class="card" style="display: none;">
    <div id="result-content"></div>
    <div style="text-align: center;">
      <button class="action-btn" onclick="copyResult()">診断結果をコピー</button>

    </div>
  </div>

// --- 状態管理変数 ---
let currentQuestionIndex = 0;
let points = {
  "光":0, "水":0, "木":0, "氷":0, "毒":0, "地":0, "風":0, "火":0, "雷":0, "闇":0,
  "HP":0, "力":0, "魔力":0, "防御":0, "魔防":0, "速さ":0
};
let allAttrBonus = 0;
let allStatBonus = 0;
let finalResultData = {}; // コピー機能用に結果を保存

// --- 画面遷移・操作ロジック ---
function startQuiz() {
  document.getElementById('start-screen').style.display = 'none';
  document.getElementById('quiz-screen').style.display = 'block';
  document.getElementById('quiz-screen').classList.add('fade-in');
  showQuestion();
}

function showQuestion() {
  const qCard = document.getElementById('question-card');
  qCard.classList.remove('fade-out');
  qCard.classList.add('fade-in');

  const q = questions[currentQuestionIndex];
  document.getElementById('question-text').innerText = q.text;
  
  // シークバーの更新
  const stepText = String(currentQuestionIndex + 1).padStart(2, '0') + " / " + questions.length;
  document.getElementById('step-counter').innerText = stepText;
  const progressPercent = ((currentQuestionIndex) / questions.length) * 100;
  document.getElementById('progress-bar-fill').style.width = progressPercent + '%';

  const optionsContainer = document.getElementById('options-container');
  optionsContainer.innerHTML = '';

  q.options.forEach(opt => {
    const btn = document.createElement('button');
    btn.className = 'option-btn';
    btn.innerText = opt.text;
    btn.onclick = () => handleAnswer(opt.effects);
    optionsContainer.appendChild(btn);
  });
}

function handleAnswer(effects) {
  // ポイント加算
  for (const [key, val] of Object.entries(effects)) {
    if (key === "全属性") { allAttrBonus += val; }
    else if (key === "全能力") { allStatBonus += val; }
    else { points[key] += val; }
  }

  const qCard = document.getElementById('question-card');
  qCard.classList.remove('fade-in');
  qCard.classList.add('fade-out');

  setTimeout(() => {
    currentQuestionIndex++;
    if (currentQuestionIndex < questions.length) {
      showQuestion();
    } else {
      calculateResult();
    }
  }, 300); // フェードアウトを待つ
}

// --- 判定ロジック ---
function calculateResult() {
  document.getElementById('progress-bar-fill').style.width = '100%';
  
  const attrKeys = ["光", "水", "木", "氷", "毒", "地", "風", "火", "雷", "闇"];
  const statKeys = ["HP", "力", "魔力", "防御", "魔防", "速さ"];

  // Q11やQ19で得た全能力ボーナスを各ステータスに加算
  statKeys.forEach(k => points[k] += allStatBonus);

  // 属性のソートと最大・最小の取得
  let attrs = attrKeys.map(k => ({name: k, val: points[k]})).sort((a, b) => b.val - a.val);
  let stats = statKeys.map(k => ({name: k, val: points[k]})).sort((a, b) => b.val - a.val);

  const maxAttr = attrs[0].val;
  const minAttr = attrs[attrs.length-1].val;
  
  // 全属性判定: 最大と最小の差が (2 + ボーナス) 以内
  let isAllAttr = (maxAttr - minAttr) <= (2 + allAttrBonus);

  // 全能力判定: 全てが2以上 かつ 最大と最小の差が3以内
  let minStat = stats[stats.length-1].val;
  let maxStat = stats[0].val;
  let isAllStats = (minStat >= 2) && ((maxStat - minStat) <= 3);

  // 描画・コピー用のデータ保存
  finalResultData = {
    isAllAttr: isAllAttr,
    isAllStats: isAllStats,
    topAttr: attrs[0].name,
    secondAttr: attrs[1].name,
    topStat: stats[0].name
  };

  renderResult();
}

function renderResult() {
  document.getElementById('quiz-screen').style.display = 'none';
  const rScreen = document.getElementById('result-screen');
  rScreen.style.display = 'block';
  rScreen.classList.add('fade-in');

  const content = document.getElementById('result-content');
  let html = "";

  if (finalResultData.isAllAttr) {
    html += `<div class="result-title">あなたにぴったりの属性は…</div>
             <div class="result-value">【全属性】</div>
             <div class="result-title">その中で一番適性がある属性：${finalResultData.topAttr}</div>`;
  } else {
    html += `<div class="result-title">あなたにぴったりの属性は…</div>
             <div class="result-value">【${finalResultData.topAttr}】</div>
             <div class="result-title">次に適性のある属性：${finalResultData.secondAttr}</div>`;
  }

  if (finalResultData.isAllStats) {
    html += `<div class="result-title" style="margin-top:15px;">高い能力：全て</div>`;
  } else {
    html += `<div class="result-title" style="margin-top:15px;">高い能力：${finalResultData.topStat}</div>`;
  }

  // テキスト結合
  const attrText = attributesDesc[finalResultData.topAttr];
  const statText = abilitiesDesc[finalResultData.topStat];
  html += `<div class="result-desc">${attrText}また、あなたは${statText}</div>`;

  content.innerHTML = html;
}

// --- コピー機能 ---
function copyResult() {
  let copyText = "";
  
  if (finalResultData.isAllAttr) {
    copyText += `あなたにぴったりの属性は…【全属性】\nその中で一番適性がある属性：${finalResultData.topAttr}\n`;
  } else {
    copyText += `あなたにぴったりの属性は…【${finalResultData.topAttr}】\n次に適性のある属性：${finalResultData.secondAttr}\n`;
  }

  if (finalResultData.isAllStats) {
    copyText += `高い能力：全て\n\n`;
  } else {
    copyText += `高い能力：${finalResultData.topStat}\n\n`;
  }

  // 実際の公開時にはURLを環境に合わせて変更してください
  copyText += `ZMTQ属性・能力診断\n${window.location.href}`;

  navigator.clipboard.writeText(copyText).then(() => {
    alert("クリップボードに診断結果をコピーしました！");
  }).catch(err => {
    alert("コピーに失敗しました。");
  });
}
</script>
